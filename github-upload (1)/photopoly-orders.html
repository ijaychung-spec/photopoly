<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photopoly — Order Status</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#2D7D52;--gl:#EBF5EF;--gh:#236441;--border:#EFEFEF;--text:#1A1A1A;--text2:#5A6B62;--text3:#A8B8B0;--r:12px;--rl:18px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F7F6;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;font-size:15px;color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1.5px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-size:1.1rem;font-weight:800;letter-spacing:-0.04em;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.wrap{max-width:520px;margin:0 auto;padding:40px 16px 80px}

/* Lookup card */
.lookup-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--rl);padding:32px 28px;margin-bottom:20px}
.lookup-card h1{font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px}
.lookup-card p{font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:24px}
.input-wrap{position:relative;margin-bottom:12px}
.lookup-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s;background:#fff}
.lookup-input:focus{border-color:var(--green)}
.btn-lookup{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .15s}
.btn-lookup:hover{background:var(--gh)}
.btn-lookup:disabled{opacity:.5;pointer-events:none}
.lookup-divider{text-align:center;font-size:.72rem;color:var(--text3);margin:10px 0}

/* Results */
.results{display:none}
.results-title{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.order-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px}
.order-card-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.order-id{font-size:.82rem;font-weight:800;color:var(--green)}
.order-date{font-size:.72rem;color:var(--text3)}
.order-card-body{padding:16px 20px}
.order-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:8px}
.order-row:last-child{margin-bottom:0}
.order-row .lbl{color:var(--text2)}
.order-row .val{font-weight:600;text-align:right}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.s-waiting{background:#FFF3E0;color:#E65100}
.s-received{background:#E8F5E9;color:#2E7D32}
.s-printing{background:#E3F2FD;color:#1565C0}
.s-shipped{background:#F3E5F5;color:#6A1B9A}
.tracking-section{background:var(--gl);border-radius:9px;padding:13px 15px;margin-top:12px}
.tracking-label{font-size:.66rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.tracking-num{font-size:.86rem;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:.04em}
.btn-track{display:inline-block;padding:7px 16px;background:var(--green);color:#fff;border-radius:8px;font-size:.76rem;font-weight:700;text-decoration:none;transition:background .15s}
.btn-track:hover{background:var(--gh)}

/* States */
.state-loading{text-align:center;padding:40px 20px;display:none}
.spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-empty{text-align:center;padding:32px 20px;display:none}
.state-empty-icon{width:48px;height:48px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.state-empty p{font-size:.82rem;color:var(--text2);line-height:1.6}

/* Step indicator */
.steps-row{display:flex;gap:6px;margin-bottom:4px}
.step-dot{flex:1;height:4px;border-radius:2px;background:var(--border)}
.step-dot.active{background:var(--green)}
.steps-label{display:flex;justify-content:space-between;font-size:.62rem;color:var(--text3);margin-bottom:14px}

@media(max-width:480px){
  .lookup-card{padding:24px 18px}
  .order-card-hdr,.order-card-body{padding:14px 16px}
  .steps-label{font-size:.58rem}
  .order-row .val{font-size:.76rem}
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="photopoly">Photo<span>poly</span></a>
  <a href="photopoly" style="font-size:.78rem;color:var(--text2);text-decoration:none;font-weight:600">Order Now →</a>
</nav>

<div class="wrap">
  <div class="lookup-card">
    <h1>Track Your Order</h1>
    <p>Enter the email address or phone number you used at checkout to see your order status.</p>

    <input class="lookup-input" id="input-email" type="email" placeholder="Email address" onkeydown="if(event.key==='Enter')lookup()">
    <div class="lookup-divider">or</div>
    <input class="lookup-input" id="input-phone" type="tel" placeholder="Phone number" onkeydown="if(event.key==='Enter')lookup()">
    <div style="height:16px"></div>
    <button class="btn-lookup" id="btn-lookup" onclick="lookup()">Look Up My Orders</button>
  </div>

  <!-- Loading -->
  <div class="state-loading" id="state-loading">
    <div class="spin"></div>
    <p style="font-size:.78rem;color:var(--text2)">Looking up your orders…</p>
  </div>

  <!-- Empty -->
  <div class="state-empty" id="state-empty">
    <div class="state-empty-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <p><strong>No orders found.</strong><br>Double-check your email or phone number and try again.</p>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-title" id="results-label">Your Orders</div>
    <div id="orders-list"></div>
  </div>
</div>

<script>
var SUPABASE_URL='https://cvanodmpzohdmaocqesh.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2YW5vZG1wem9oZG1hb2NxZXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODkwOTIsImV4cCI6MjA5MDU2NTA5Mn0.w3DUnMX5xSB_BCfIWwa45Kh0s4bMj0YaKyHN6WLoel0';

function fmtDate(iso){
  if(!iso)return'—';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function statusInfo(s){
  var map={
    waiting_photos:{label:'Waiting for Photos',cls:'s-waiting',step:1},
    photos_received:{label:'Photos Received',cls:'s-received',step:2},
    printing:{label:'Printing',cls:'s-printing',step:3},
    shipped:{label:'Shipped',cls:'s-shipped',step:4}
  };
  return map[s]||{label:s,cls:'s-waiting',step:1};
}

function buildSteps(step){
  var labels=['Photos','In Production','Printing','Shipped'];
  var dots=labels.map(function(_,i){
    return '<div class="step-dot'+(i<step?' active':'')+'"></div>';
  }).join('');
  var lbls=labels.map(function(l){return'<span>'+l+'</span>'}).join('');
  return'<div class="steps-row">'+dots+'</div><div class="steps-label">'+lbls+'</div>';
}

function renderOrder(o){
  var si=statusInfo(o.status);
  var total=((o.price||0)*(o.qty||1))+(((o.price||0)*(o.qty||1))>=30?0:4.99);
  var trackHtml='';
  if(o.tracking_number){
    trackHtml='<div class="tracking-section">'
      +'<div class="tracking-label">Tracking Number</div>'
      +'<div class="tracking-num">'+o.tracking_number+'</div>'
      +'<a class="btn-track" href="https://tools.usps.com/go/TrackConfirmAction?tLabels='+encodeURIComponent(o.tracking_number)+'" target="_blank">Track on USPS →</a>'
      +'</div>';
  }
  return '<div class="order-card">'
    +'<div class="order-card-hdr">'
    +'<div class="order-id">#'+o.id+'</div>'
    +'<div class="order-date">'+fmtDate(o.created_at)+'</div>'
    +'</div>'
    +'<div class="order-card-body">'
    +buildSteps(si.step)
    +'<div class="order-row"><span class="lbl">Status</span><span class="val"><span class="status-pill '+si.cls+'">'+si.label+'</span></span></div>'
    +'<div class="order-row"><span class="lbl">Product</span><span class="val">'+(o.product||'—')+'</span></div>'
    +'<div class="order-row"><span class="lbl">Quantity</span><span class="val">'+(o.qty||1)+' set'+(o.qty>1?'s':'')+'</span></div>'
    +'<div class="order-row"><span class="lbl">Ship to</span><span class="val">'+(o.cust_city||'')+(o.cust_state?', '+o.cust_state:'')+'</span></div>'
    +'<div class="order-row"><span class="lbl">Total</span><span class="val">$'+total.toFixed(2)+'</span></div>'
    +trackHtml
    +'</div>'
    +'</div>';
}

async function lookup(){
  var email=(document.getElementById('input-email').value||'').trim().toLowerCase();
  var phone=(document.getElementById('input-phone').value||'').replace(/\D/g,'');

  if(!email&&!phone){
    alert('Please enter your email address or phone number.');
    return;
  }

  // Show loading
  document.getElementById('state-loading').style.display='block';
  document.getElementById('state-empty').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('btn-lookup').disabled=true;

  try{
    var orders=[];

    if(email){
      var res=await fetch(SUPABASE_URL+'/rest/v1/orders?cust_email=eq.'+encodeURIComponent(email)+'&order=created_at.desc&limit=10',{
        headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}
      });
      var rows=await res.json();
      if(Array.isArray(rows)) orders=orders.concat(rows);
    }

    if(phone&&!orders.length){
      var last10=phone.slice(-10);
      var res2=await fetch(SUPABASE_URL+'/rest/v1/orders?cust_phone=like.*'+encodeURIComponent(last10)+'*&order=created_at.desc&limit=10',{
        headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}
      });
      var rows2=await res2.json();
      if(Array.isArray(rows2)) orders=orders.concat(rows2);
    }

    // Deduplicate
    var seen={};
    orders=orders.filter(function(o){
      if(seen[o.id])return false;
      seen[o.id]=true;return true;
    });

    document.getElementById('state-loading').style.display='none';

    if(!orders.length){
      document.getElementById('state-empty').style.display='block';
    } else {
      document.getElementById('results-label').textContent=
        orders.length+' Order'+(orders.length>1?'s':'')+' Found';
      document.getElementById('orders-list').innerHTML=orders.map(renderOrder).join('');
      document.getElementById('results').style.display='block';
    }
  }catch(e){
    console.error(e);
    document.getElementById('state-loading').style.display='none';
    alert('Something went wrong. Please try again.');
  }

  document.getElementById('btn-lookup').disabled=false;
}
</script>
</body>
</html>
